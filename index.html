<!DOCTYPE html>
<html>
<head>
    <title>Sleep & Yoga Study Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            background: #f4f6f8;
        }
        h1 { text-align: center; }
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input, select {
            margin: 5px 0;
            padding: 5px;
            width: 100%;
        }
        button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
            cursor: pointer;
        }
        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: center;
        }
        th { background: #e8ecef; }
        .deleteBtn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
        }
        .clearBtn {
            background: black;
            color: white;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h1>14-Day Sleep & Yoga Study</h1>

<form id="dataForm">
    <label>Date</label>
    <input type="date" id="date" required>

    <label>Sleep Hours</label>
    <input type="number" step="0.1" id="sleep">

    <label>Mood (1–10)</label>
    <input type="number" min="1" max="10" id="mood">

    <label>Anxiety (1–10)</label>
    <input type="number" min="1" max="10" id="anxiety">

    <label>Energy (1–10)</label>
    <input type="number" min="1" max="10" id="energy">

    <label>Focus (1–10)</label>
    <input type="number" min="1" max="10" id="focus">

    <label>Yoga Completed?</label>
    <select id="yoga">
        <option value="No">No</option>
        <option value="Yes">Yes</option>
    </select>

    <button type="submit">Add Entry</button>
</form>

<h2>Data Log</h2>
<table id="dataTable">
    <thead>
        <tr>
            <th>Date</th>
            <th>Sleep</th>
            <th>Mood</th>
            <th>Anxiety</th>
            <th>Energy</th>
            <th>Focus</th>
            <th>Yoga</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button class="clearBtn" onclick="clearAll()">Clear All Data</button>

<h2>Averages</h2>
<p id="averages"></p>

<script>
let form = document.getElementById("dataForm");
let tableBody = document.querySelector("#dataTable tbody");
let averagesText = document.getElementById("averages");

let data = JSON.parse(localStorage.getItem("studyData")) || [];

function save() {
    localStorage.setItem("studyData", JSON.stringify(data));
}

function deleteEntry(index) {
    data.splice(index, 1);
    save();
    render();
}

function clearAll() {
    if (confirm("Are you sure you want to delete all data?")) {
        data = [];
        save();
        render();
    }
}

function render() {
    tableBody.innerHTML = "";

    data.forEach((entry, index) => {
        let row = `<tr>
            <td>${entry.date}</td>
            <td>${entry.sleep}</td>
            <td>${entry.mood}</td>
            <td>${entry.anxiety}</td>
            <td>${entry.energy}</td>
            <td>${entry.focus}</td>
            <td>${entry.yoga}</td>
            <td><button class="deleteBtn" onclick="deleteEntry(${index})">X</button></td>
        </tr>`;
        tableBody.innerHTML += row;
    });

    if (data.length > 0) {
        let avg = field => 
            (data.reduce((a,b)=>a+Number(b[field]||0),0)/data.length).toFixed(2);

        averagesText.innerHTML =
            `Avg Mood: ${avg("mood")} |
             Avg Anxiety: ${avg("anxiety")} |
             Avg Energy: ${avg("energy")} |
             Avg Focus: ${avg("focus")}`;
    } else {
        averagesText.innerHTML = "No data yet.";
    }
}

form.addEventListener("submit", function(e){
    e.preventDefault();

    let entry = {
        date: date.value,
        sleep: sleep.value,
        mood: mood.value,
        anxiety: anxiety.value,
        energy: energy.value,
        focus: focus.value,
        yoga: yoga.value
    };

    data.push(entry);
    save();
    render();
    form.reset();
});

render();
</script>

</body>
</html>
