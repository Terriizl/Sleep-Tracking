<!DOCTYPE html>
<html>
<head>
    <title>Sleep & Yoga Psychological Study</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            background: #f2f2f7;
        }
        h1 { text-align: center; }

        form {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        input {
            margin: 6px 0;
            padding: 8px;
            width: 100%;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            background: black;
            color: white;
            border: none;
            border-radius: 6px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #fafafa;
        }

        .deleteBtn {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
        }

        canvas {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Sleep & Morning Activation Study</h1>

<form id="dataForm">
    <label>Date</label>
    <input type="date" id="date" required>

    <label>Bedtime</label>
    <input type="time" id="bedtime" required>

    <label>Wake-up Time</label>
    <input type="time" id="waketime" required>

    <label>Yoga Time (minutes)</label>
    <input type="number" id="yogatime">

    <label>Mood (1–10)</label>
    <input type="number" min="1" max="10" id="mood">

    <label>Anxiety (1–10)</label>
    <input type="number" min="1" max="10" id="anxiety">

    <label>Energy (1–10)</label>
    <input type="number" min="1" max="10" id="energy">

    <label>Focus (1–10)</label>
    <input type="number" min="1" max="10" id="focus">

    <button type="submit">Add Entry</button>
</form>

<h2>Data Log</h2>
<table id="dataTable">
    <thead>
        <tr>
            <th>Date</th>
            <th>Bed</th>
            <th>Wake</th>
            <th>Sleep (hrs)</th>
            <th>Yoga (min)</th>
            <th>Mood</th>
            <th>Anxiety</th>
            <th>Energy</th>
            <th>Focus</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Sleep Duration Graph</h2>
<canvas id="sleepChart"></canvas>

<script>
let form = document.getElementById("dataForm");
let tableBody = document.querySelector("#dataTable tbody");
let data = JSON.parse(localStorage.getItem("studyData")) || [];

function save() {
    localStorage.setItem("studyData", JSON.stringify(data));
}

function calculateSleep(bed, wake) {
    let bedTime = new Date("1970-01-01T" + bed);
    let wakeTime = new Date("1970-01-01T" + wake);
    if (wakeTime < bedTime) {
        wakeTime.setDate(wakeTime.getDate() + 1);
    }
    return ((wakeTime - bedTime) / (1000 * 60 * 60)).toFixed(2);
}

function deleteEntry(index) {
    data.splice(index, 1);
    save();
    render();
}

function render() {
    tableBody.innerHTML = "";

    data.forEach((entry, index) => {
        let row = `<tr>
            <td>${entry.date}</td>
            <td>${entry.bedtime}</td>
            <td>${entry.waketime}</td>
            <td>${entry.sleep}</td>
            <td>${entry.yogatime}</td>
            <td>${entry.mood}</td>
            <td>${entry.anxiety}</td>
            <td>${entry.energy}</td>
            <td>${entry.focus}</td>
            <td><button class="deleteBtn" onclick="deleteEntry(${index})">X</button></td>
        </tr>`;
        tableBody.innerHTML += row;
    });

    updateChart();
}

form.addEventListener("submit", function(e){
    e.preventDefault();

    let sleepHours = calculateSleep(bedtime.value, waketime.value);

    let entry = {
        date: date.value,
        bedtime: bedtime.value,
        waketime: waketime.value,
        sleep: sleepHours,
        yogatime: yogatime.value || 0,
        mood: mood.value,
        anxiety: anxiety.value,
        energy: energy.value,
        focus: focus.value
    };

    data.push(entry);
    save();
    render();
    form.reset();
});

let ctx = document.getElementById("sleepChart").getContext("2d");
let sleepChart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: [],
        datasets: [{
            label: 'Sleep Hours',
            data: [],
            borderRadius: 10
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        },
        scales: {
            y: {
                beginAtZero: true,
                max: 12
            }
        }
    }
});

function updateChart() {
    sleepChart.data.labels = data.map(d => d.date);
    sleepChart.data.datasets[0].data = data.map(d => d.sleep);
    sleepChart.update();
}

render();
</script>

</body>
</html>
